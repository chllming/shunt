# systemd drop-in for the Ollama service on the model host.
# Install as: /etc/systemd/system/ollama.service.d/10-keepalive.conf
# then: sudo systemctl daemon-reload && sudo systemctl restart ollama
#
# - OLLAMA_HOST binds localhost only (the SSH tunnel is the sole ingress).
# - OLLAMA_KEEP_ALIVE=-1 keeps the classifier model resident so verdicts stay
#   sub-second instead of paying a ~40s cold load on the first call.
# - OLLAMA_MAX_LOADED_MODELS=1 avoids evicting the classifier under other load.
[Service]
Environment=OLLAMA_HOST=127.0.0.1:11434
Environment=OLLAMA_KEEP_ALIVE=-1
Environment=OLLAMA_MAX_LOADED_MODELS=1
