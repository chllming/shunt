name: Release open core

on:
  push:
    tags:
      - 'core-v*'

permissions:
  contents: read

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Require package versions to match the core tag
        run: |
          VERSION="${GITHUB_REF_NAME#core-v}"
          test "$VERSION" = "$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)"
          test "$VERSION" = "$(node -p "require('./npm/vibe-shunt/package.json').version")"

  build:
    needs: validate-tag
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: shunt-aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: shunt-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: shunt-aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          STAGING="shunt-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$STAGING"
          cp target/${{ matrix.target }}/release/shunt "$STAGING/"
          cp README.md LICENSE "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}

  package-npm:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: npm/vibe-shunt/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: npm/vibe-shunt
      - run: npm test
        working-directory: npm/vibe-shunt
      - run: npm pack --pack-destination ../..
        working-directory: npm/vibe-shunt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vibe-shunt-npm
          path: vibe-shunt-*.tgz

  release:
    needs: [build, package-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true
      - run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
            artifacts/*.tgz
          generate_release_notes: true

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Publish shunt-proxy-core
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci --ignore-scripts
        working-directory: npm/vibe-shunt
      - run: npm publish --access public --provenance
        working-directory: npm/vibe-shunt
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
